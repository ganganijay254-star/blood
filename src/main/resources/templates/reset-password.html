<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BloodCare</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/reset-password.css">

</head>
<body>

<div class="page-bg">
  <div class="auth-container">
    <div class="auth-box auth-neo">

      <h2>Reset Your Password</h2>
      <p>Enter your new password</p>

      <input type="password" id="newPassword" placeholder="New Password">
      <input type="password" id="confirmPassword" placeholder="Confirm Password">

      <button class="btn btn-main" onclick="resetPassword()">Update Password</button>

    </div>
  </div>
</div>

    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

      if (!token) {
        if (typeof localShow === 'function') localShow("Invalid or missing token", 'error');
        else alert("Invalid or missing token");
        window.location.href = "/login";
      }

  async function resetPassword() {
    const password = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;

    if (!password || !confirm) {
          if (typeof localShow === 'function') localShow("All fields required", 'error');
          else alert("All fields required");
      return;
    }

    if (password !== confirm) {
          if (typeof localShow === 'function') localShow("Passwords do not match", 'error');
          else alert("Passwords do not match");
      return;
    }

    try {
      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, password })
      });

      if (!res.ok) {
        if (typeof localShow === 'function') localShow("Token expired or invalid", 'error');
        else alert("Token expired or invalid");
        return;
      }

      if (typeof localShow === 'function') localShow("Password updated successfully 🎉", 'success');
      else alert("Password updated successfully 🎉");
      window.location.href = "/login";

    } catch (err) {
      if (typeof localShow === 'function') localShow("Server error", 'error');
      else alert("Server error");
    }
  }
</script>

</body>
</html>
