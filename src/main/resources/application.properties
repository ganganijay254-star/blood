spring.application.name=BloodCare
server.port=8082

# =========================
# GOOGLE OAUTH
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# =========================
# MYSQL DATABASE CONFIG (AUTO CREATE)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/bloodcare_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always




# =====================
# EMAIL CONFIG (GMAIL)
# =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bloodcares.app@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
